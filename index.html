    <!-- CAPA -->
    <div class="capa">
        <h1 class="book-title">The Programmer Diaries</h1>
        <p class="subtitulo">diário totalmente dedicado a você gatinha! <br> De Vitor para Dayanne. </p>
    </div>

    <!-- CONTEÚDO -->
    <div class="conteudo">
        <div class="timeline">

            <div class="entry" data-text="Achei que esse dia fosse ser só mais um entre vários, um feriado qualquer, mas isso mudou a partir do momento em que recebi a sua primeira mensagem. A gente conversou por bastante tempo, mas, pra ser bem sincero, achei que no outro dia a gente já nem estaria mais se falando. Acabei errando feio nessa, mas posso dizer que esse foi o melhor erro que cometi em minha vida, porque hoje eu não me imagino sem você. Tudo ficaria sem graça. Em poucos dias de conversa, eu me dei conta de que já te amava, e talvez isso seja algo bem emocionado, mas não dá pra mentir sobre isso. Eu tenho muito a agradecer a você. Você é a mulher mais linda, fofa, responsável, dedicada, leal e carinhosa, e eu poderia passar o dia citando elogios, mas, pra resumir, você é perfeita. Você é bem mais do que eu poderia querer pra mim, e quero você somente pra mim, que fique comigo pelo resto de nossas vidas, mesmo que isso signifique ser a pessoa mais egoísta do universo. Quero que seja você, apenas você, porque eu te amo!">
                <div class="ponto"></div>
                <div class="date">Dia 3 de abril</div>
                <div class="text"></div>
            </div>

            <div class="entry" data-text="Esse foi o dia em que a gente oficializou nosso namoro. Não demorou muito, se levar em conta o tempo que passou desde o dia em que te conheci, mas quer saber? Eu não ligo que tenha sido rápido. Pra ser bem sincero, eu não me arrependo de nada, porque é com você que eu quero estar. Não demorou muito pra eu perceber que amo muito você, e é exatamente esse tipo de relação que eu quero ter, se for com você. Eu espero que você tenha paciência e não se canse de mim até o dia em que a gente possa se encontrar. E eu te prometo que vou fazer um pedido digno, à altura da mulher que você é, da mulher por quem eu me apaixonei. Então, espero que você suporte essa distância assim como eu tenho que suportar também. Vou fazer o possível pra resolver essa distância entre a gente o mais rápido possível. Eu te amo, Dayanne! ">
                <div class="ponto"></div>
                <div class="date">Dia 19 de abril</div>
                <div class="text"></div>
            </div>

        </div>
    </div>
